<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Prophet Dashboard</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --text: #ffffff;
      --muted: #a0aec0;
      --green: #4CAF50;
      --blue: #2196F3;
      --error: #f56565;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    .container {
      width: 100%;
      max-width: 600px;
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .title { font-size: 1.25rem; font-weight: 700; }
    .status {
      font-size: 0.9rem;
      color: var(--muted);
    }
    .status.error { color: var(--error); }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px;
    }
    .label { color: var(--muted); font-size: 0.85rem; }
    .value { font-size: 1.1rem; font-weight: 600; }
    .bar {
      height: 30px;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      background: #0f162b;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .bar .a { background: var(--green); }
    .bar .b { background: var(--blue); }
    .bar span {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #0b1323;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
      font-size: 0.9rem;
      min-width: 48px;
    }
    .confidence {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .confidence .badge {
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      font-weight: 600;
    }
    .badge span { display: block; color: var(--muted); font-weight: 500; font-size: 0.85rem; }
    .footer { margin-top: 16px; font-size: 0.85rem; color: var(--muted); text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">CS Prophet – Bombsite Probabilities</div>
      <div id="status" class="status">Connecting…</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Map</div>
        <div id="map" class="value">—</div>
      </div>
      <div class="card">
        <div class="label">Round</div>
        <div id="round" class="value">—</div>
      </div>
      <div class="card">
        <div class="label">CT Score</div>
        <div id="ct" class="value">—</div>
      </div>
      <div class="card">
        <div class="label">T Score</div>
        <div id="t" class="value">—</div>
      </div>
      <div class="card">
        <div class="label">Steps</div>
        <div id="steps" class="value">—</div>
      </div>
      <div class="card">
        <div class="label">State</div>
        <div id="state" class="value">Waiting…</div>
      </div>
    </div>

    <div class="card" style="margin-bottom: 12px;">
      <div class="label" style="margin-bottom: 8px;">Bombsite Likelihood</div>
      <div class="bar">
        <span id="bar-a" class="a" style="width: 50%;">A 50%</span>
        <span id="bar-b" class="b" style="width: 50%;">B 50%</span>
      </div>
    </div>

    <div class="confidence">
      <div class="badge" style="color: var(--green);">
        <span>A Site</span>
        <div id="conf-a">—</div>
      </div>
      <div class="badge" style="color: var(--blue);">
        <span>B Site</span>
        <div id="conf-b">—</div>
      </div>
    </div>

    <div class="footer">Polling /state every 500 ms</div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const mapEl = document.getElementById('map');
    const roundEl = document.getElementById('round');
    const ctEl = document.getElementById('ct');
    const tEl = document.getElementById('t');
    const stepsEl = document.getElementById('steps');
    const stateEl = document.getElementById('state');
    const barA = document.getElementById('bar-a');
    const barB = document.getElementById('bar-b');
    const confA = document.getElementById('conf-a');
    const confB = document.getElementById('conf-b');

    function updateBars(a, b) {
      const total = Math.max(a + b, 1);
      const pctA = Math.round((a / total) * 100);
      const pctB = Math.max(0, 100 - pctA);

      barA.style.width = pctA + '%';
      barB.style.width = pctB + '%';

      barA.textContent = `A ${pctA}%`;
      barB.textContent = `B ${pctB}%`;

      confA.textContent = pctA + '%';
      confB.textContent = pctB + '%';
    }

    async function poll() {
      try {
        const res = await fetch('/state', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        statusEl.textContent = 'Live';
        statusEl.classList.remove('error');

        mapEl.textContent = data.map ?? '—';
        roundEl.textContent = data.round ?? '—';
        ctEl.textContent = data.ct_score ?? '—';
        tEl.textContent = data.t_score ?? '—';
        stepsEl.textContent = data.steps ?? '—';
        stateEl.textContent = 'Connected';

        const a = Number(data.A) || 0;
        const b = Number(data.B) || 0;
        updateBars(a, b);
      } catch (err) {
        statusEl.textContent = 'Disconnected';
        statusEl.classList.add('error');
        stateEl.textContent = 'Waiting…';
      }
    }

    poll();
    setInterval(poll, 500);
  </script>
</body>
</html>
