model:
  input_dim: 218
  d_model: 128
  nhead: 4
  num_layers: 2
  dropout: 0.3
  num_classes: 2

training:
  epochs: 50
  batch_size: 8
  gradient_accumulation_steps: 16
  num_workers: 4
  val_num_workers: 2
  learning_rate: 1.0e-4
  weight_decay: 1.0e-3
  early_stop_patience: 10
  val_split: 0.1
  test_split: 0.1
  seed: 42
  use_amp: true
  focal_loss_gamma: 2.0

data:
  schema_version: v2
  raw_dir: raw/demos
  processed_dir: processed_v2
  splits_dir: splits
  sequence_length: 720
  tick_rate: 64
  target_tick_rate: 8

logging:
  log_dir: runs/
  save_dir: checkpoints/v2/
  log_interval: 10
