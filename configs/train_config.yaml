model:
  input_dim: 74        # 10 players × 7 features (x,y,z,hp,armor,helmet,alive) = 70 + map_zone_onehot(4)
  d_model: 256
  nhead: 8
  num_layers: 4
  dropout: 0.1
  num_classes: 3       # A / B / other

training:
  epochs: 100
  batch_size: 32
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  val_split: 0.1
  test_split: 0.1
  seed: 42
  use_amp: true        # mixed-precision (torch.cuda.amp)
  focal_loss_gamma: 2.0

data:
  raw_dir: data/raw/demos
  processed_dir: data/processed
  splits_dir: data/splits
  sequence_length: 240  # 30 s × 8 ticks/s
  tick_rate: 64
  target_tick_rate: 8

logging:
  log_dir: runs/
  save_dir: checkpoints/
  log_interval: 10
