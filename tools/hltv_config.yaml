# Proxy for school/restricted networks (e.g. "http://127.0.0.1:7890")
# Also reads HTTPS_PROXY / HTTP_PROXY / ALL_PROXY env vars as fallback
proxy: "http://127.0.0.1:7897"

target_demos: 1000
# Safety backstop — don't fetch matches older than this many days
cutoff_days: 400

# Leave empty to download from all events (no filter)
allowed_events:
  - "BLAST Bounty 2026 Season 1 Finals"
  - "IEM Kraków 2026"
  - "PGL Cluj-Napoca 2026"
  - "ESL Pro League Season 23 Finals"
  - "BLAST Open Rotterdam 2026"
  - "PGL Bucharest 2026"
  - "BetBoom RUSH B Summit Season 2"
  - "BC Game Masters Championship Season 1"
  - "Stake Ranked Episode 1"
  - "United21 Esplay Challenge Season 1"
  - "IEM Kraków 2026 Stage 1"
  - "Copenhagen Gaming Week Showdown 2026"
  - "IstanbulAN 2026"
  - "Roman Imperium Cup V"
  - "Esplay De_Airport Masters 2026"
  - "Parken Challenger Championship Season 1"
  - "Digital Crusade DraculaN Season 5"
  - "Esplay Backforce Masters 2026"
  - "Parken Challenger Championship Season 2"
  - "HyperX Roman Imperium Cup VI"
  - "Urban Riga Open Season 3"
  - "ROG JOURNEY Spring 2026"
  - "Radio Popular Roman Imperium Cup VII"
  - "Digital Crusade DraculaN Season 6"
  - "Parken Challenger Championship Season 3"
  - "Urban Riga Open Season 4"
  - "HLC Belgrade PRO 2026"
  - "FiRe CONTER Season 3"
  - "Parken Challenger Championship Season 4"
  


maps:
  - de_mirage
  - de_inferno
  - de_dust2
  - de_nuke
  - de_ancient
  - de_overpass
  - de_anubis

rate_limit:
  min_delay: 2
  max_delay: 5
  pause_every: 100
  pause_duration: 30
  max_retries: 3

output:
  demos_dir: raw/demos
  manifest: raw/manifest.jsonl
  failed_log: raw/failed.jsonl
