target_demos: 700
# Safety backstop — don't fetch matches older than this many days
cutoff_days: 400

# Leave empty to download from all events (no filter)
allowed_events:
  - "StarLadder Budapest Major 2025"
  - "IEM Chengdu 2025"
  - "PGL Masters Bucharest 2025"
  - "Thunderpick World Championship 2025"
  - "CS Asia Championships 2025"
  - "ESL Pro League Season 22"
  - "FISSURE Playground 2"
  - "Esports World Cup 2025"
  - "IEM Cologne 2025"
  - "FISSURE Playground 1"
  - "BLAST.tv Austin Major 2025"
  - "IEM Dallas 2025"
  - "PGL Astana 2025"
  - "IEM Melbourne 2025"
  - "PGL Bucharest 2025"
  - "ESL Pro League Season 21"
  - "PGL Cluj-Napoca 2025"
  - "IEM Katowice 2025"

maps:
  - de_mirage
  - de_inferno
  - de_dust2
  - de_nuke
  - de_ancient
  - de_overpass
  - de_anubis

rate_limit:
  min_delay: 2
  max_delay: 5
  pause_every: 10
  pause_duration: 30
  max_retries: 3

output:
  demos_dir: ../data/raw/demos
  manifest: ../data/raw/manifest.json
  failed_log: ../data/raw/failed.json
