# Proxy for school/restricted networks (e.g. "http://127.0.0.1:7890")
# Also reads HTTPS_PROXY / HTTP_PROXY / ALL_PROXY env vars as fallback
proxy: "http://127.0.0.1:7897"

target_demos: 1000
# Safety backstop — don't fetch matches older than this many days
cutoff_days: 400

# Leave empty to download from all events (no filter)
allowed_events:
#  - "BLAST Open Rotterdam 2026"
  - "ESL Pro League Season 23"
  - "PGL Cluj-Napoca 2026"
  - "IEM Kraków 2026"
  - "BLAST Bounty 2026 Season 1"
  - "StarLadder Budapest Major 2025"
  - "IEM Chengdu 2025"
  - "PGL Masters Bucharest 2025"
  - "Thunderpick World Championship 2025"
  - "CS Asia Championships 2025"
  - "ESL Pro League Season 22 Finals"
  - "FISSURE Playground 2"
  - "Esports World Cup 2025"
  - "IEM Cologne 2025"
  - "FISSURE Playground 1"
  - "BLAST.tv Austin Major 2025"
  - "IEM Dallas 2025"
  - "PGL Astana 2025"
  - "IEM Melbourne 2025"
  - "PGL Bucharest 2025"
  - "ESL Pro League Season 21 Finals"
  - "PGL Cluj-Napoca 2025"
  - "IEM Katowice 2025"

maps:
  - de_mirage
  - de_inferno
  - de_dust2
  - de_nuke
  - de_ancient
  - de_overpass
  - de_anubis

rate_limit:
  min_delay: 2
  max_delay: 5
  pause_every: 100
  pause_duration: 30
  max_retries: 3

output:
  demos_dir: ../data/raw/demos
  manifest: ../data/raw/manifest.jsonl
  failed_log: ../data/raw/failed.jsonl
